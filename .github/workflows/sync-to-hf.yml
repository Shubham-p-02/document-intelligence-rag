name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allows manual runs from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: Shubham-p-02/document-intelligence-rag
          huggingface_repo_id: shubhamp02/document-intelligence-rag
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: gradio
